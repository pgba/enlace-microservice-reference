name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy packages examples/adapters/src
      - name: Pytest
        run: uv run pytest
      - name: Export JSON Schema
        run: uv run python scripts/export_schemas.py
