[project]
name = "enlace-transport"
version = "0.1.0"
description = "Transport adapters for Enlace microservices"
requires-python = ">=3.12"
dependencies = [
    "enlace-contracts",
    "enlace-core",
    "fastapi>=0.115",
    "httpx>=0.27",
    "pydantic>=2.10",
    "redis>=5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/enlace_transport"]

[tool.uv.sources]
enlace-core = { workspace = true }
enlace-contracts = { workspace = true }
