[project]
name = "enlace-curation"
version = "0.1.0"
description = "Curation service role abstractions for Enlace microservices"
requires-python = ">=3.12"
dependencies = [
    "enlace-contracts",
    "enlace-core",
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/enlace_curation"]

[tool.uv.sources]
enlace-core = { workspace = true }
enlace-contracts = { workspace = true }
