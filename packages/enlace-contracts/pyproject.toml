[project]
name = "enlace-contracts"
version = "0.1.0"
description = "Boundary payload contracts for Enlace microservices"
requires-python = ">=3.12"
dependencies = [
    "enlace-core",
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/enlace_contracts"]

[tool.uv.sources]
enlace-core = { workspace = true }
