[project]
name = "enlace-core"
version = "0.1.0"
description = "Shared envelope, metadata, and error types for Enlace microservices"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/enlace_core"]
